{{- range $name, $svc := .Values.services }}
{{- if $svc.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $svc.serviceName }}-config
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
    {{- include "microservices.labels" $ | nindent 4 }}
data:
  {{- toYaml $svc.config | nindent 2 }}
---
{{- end }}
{{- end }}
