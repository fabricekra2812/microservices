{{- range $name, $svc := .Values.services }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.serviceName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.serviceName }}
    {{- include "microservices.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ $svc.serviceName }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
---
{{- end }}
